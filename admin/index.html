<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOURAV — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020408;color:#e0eeff;font-family:'Syne',sans-serif;min-height:100vh}
h1,h2,h3,h4{font-family:'Orbitron',sans-serif}
a{color:#00D4FF;text-decoration:none}
.login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:2rem}
.login-box{background:rgba(5,13,26,0.8);border:1px solid rgba(0,212,255,0.2);padding:3rem;width:100%;max-width:420px;position:relative}
.login-box::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:linear-gradient(90deg,transparent,#00D4FF,#7B61FF,transparent)}
.login-title{text-align:center;font-size:1.2rem;letter-spacing:0.3em;color:#00D4FF;margin-bottom:0.5rem;text-shadow:0 0 20px rgba(0,212,255,0.5)}
.login-sub{text-align:center;font-size:0.7rem;color:rgba(224,238,255,0.35);letter-spacing:0.15em;margin-bottom:2rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-family:'Orbitron',sans-serif;font-size:0.55rem;letter-spacing:0.2em;color:rgba(224,238,255,0.5);margin-bottom:0.4rem}
.form-group input,.form-group textarea,.form-group select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(0,212,255,0.15);padding:0.7rem 1rem;color:#e0eeff;font-family:'Syne',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group textarea:focus{border-color:#00D4FF}
.btn{display:inline-block;padding:0.7rem 2rem;font-family:'Orbitron',sans-serif;font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;border:1px solid #00D4FF;color:#00D4FF;background:transparent;cursor:pointer;transition:all 0.3s}
.btn:hover{background:#00D4FF;color:#020408}
.btn-primary{background:linear-gradient(135deg,#00D4FF,#7B61FF);border:none;color:#fff;width:100%;padding:0.85rem}
.btn-primary:hover{opacity:0.9;color:#fff}
.btn-danger{background:transparent;border-color:#ef4444;color:#ef4444}
.btn-danger:hover{background:#ef4444;color:#fff}
.btn-sm{padding:0.4rem 0.8rem;font-size:0.5rem}
.admin-layout{display:none;min-height:100vh}
.admin-layout.active{display:flex}
.sidebar{width:220px;background:rgba(5,13,26,0.95);border-right:1px solid rgba(0,212,255,0.08);padding:1.5rem 0;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar-logo{padding:0 1.5rem 1.5rem;font-size:0.75rem;letter-spacing:0.3em;color:#00D4FF;border-bottom:1px solid rgba(0,212,255,0.08);margin-bottom:1rem;text-shadow:0 0 15px rgba(0,212,255,0.4)}
.sidebar-item{padding:0.7rem 1.5rem;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(224,238,255,0.4);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px}
.sidebar-item:hover,.sidebar-item.active{color:#00D4FF;background:rgba(0,212,255,0.04)}
.sidebar-item.active{border-left:2px solid #00D4FF}
.main-content{margin-left:220px;flex:1;padding:2rem;min-height:100vh}
.header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid rgba(0,212,255,0.08)}
.header-bar h2{font-size:1rem;letter-spacing:0.3em;color:#00D4FF;text-shadow:0 0 15px rgba(0,212,255,0.3)}
.header-user{font-size:0.6rem;color:rgba(224,238,255,0.35);letter-spacing:0.15em}
.section{display:none}
.section.active{display:block}
.item-card{background:rgba(5,13,26,0.6);border:1px solid rgba(0,212,255,0.08);padding:1rem;margin-bottom:0.8rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;transition:border-color 0.2s}
.item-card:hover{border-color:rgba(0,212,255,0.2)}
.item-card .info{flex:1;min-width:0}
.item-card .info .title{font-size:0.85rem;color:#e0eeff;margin-bottom:0.2rem}
.item-card .info .meta{font-size:0.6rem;color:rgba(224,238,255,0.35);font-family:'Orbitron',sans-serif;letter-spacing:0.1em}
.item-card .actions{display:flex;gap:0.5rem;flex-shrink:0}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:1rem 1.5rem;background:rgba(5,13,26,0.95);border:1px solid #00D4FF;color:#e0eeff;font-size:0.8rem;transform:translateX(120%);transition:transform 0.3s;max-width:350px}
.toast.show{transform:translateX(0)}
.toast.success{border-color:#34D399}
.toast.error{border-color:#ef4444}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,4,8,0.85);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:rgba(5,13,26,0.98);border:1px solid rgba(0,212,255,0.2);padding:2rem;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;position:relative}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:linear-gradient(90deg,#00D4FF,#7B61FF)}
.modal h3{font-size:0.8rem;letter-spacing:0.25em;color:#00D4FF;margin-bottom:1.5rem}
.modal .form-group textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:0.8rem;margin-top:1.5rem}
.color-picker{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s}
.color-swatch:hover,.color-swatch.active{border-color:#fff}
.empty-msg{padding:2rem;text-align:center;color:rgba(224,238,255,0.3);font-size:0.8rem}
.add-btn{width:100%;padding:0.8rem;border:1px dashed rgba(0,212,255,0.2);background:transparent;color:rgba(0,212,255,0.4);font-family:'Orbitron',sans-serif;font-size:0.55rem;letter-spacing:0.2em;cursor:pointer;transition:all 0.3s;margin-bottom:1.5rem;text-transform:uppercase}
.add-btn:hover{border-color:#00D4FF;color:#00D4FF}
.loading{text-align:center;padding:3rem;color:rgba(224,238,255,0.3);font-size:0.8rem}
.logout-btn{background:none;border:none;color:rgba(224,238,255,0.3);font-family:'Orbitron',sans-serif;font-size:0.5rem;letter-spacing:0.2em;cursor:pointer;padding:0.7rem 1.5rem;text-align:left;width:100%;transition:color 0.2s;text-transform:uppercase;border-top:1px solid rgba(0,212,255,0.08);margin-top:1rem}
.logout-btn:hover{color:#ef4444}
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-logo{font-size:0;padding:1rem 0;text-align:center}
  .sidebar-logo::after{content:'◈';font-size:1rem}
  .sidebar-item span{display:none}
  .main-content{margin-left:60px;padding:1rem}
  .item-card{flex-direction:column;align-items:flex-start}
  .item-card .actions{align-self:flex-end}
}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-title">◈ ADMIN ACCESS</div>
    <div class="login-sub">Authorized Personnel Only</div>
    <div class="form-group">
      <label>IDENTIFICATION</label>
      <input type="text" id="loginUser" placeholder="Username" value="Sourav">
    </div>
    <div class="form-group">
      <label>PASSPHRASE</label>
      <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">AUTHENTICATE</button>
    <div style="text-align:center;margin-top:1rem;font-size:0.55rem;color:rgba(224,238,255,0.2);letter-spacing:0.15em" id="loginError"></div>
    <div style="text-align:center;margin-top:1.5rem"><a href="/" style="font-size:0.5rem;letter-spacing:0.2em;color:rgba(224,238,255,0.2)">← Back to Portfolio</a></div>
  </div>
</div>

<div id="adminLayout" class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-logo">◈ S · ADMIN</div>
    <div class="sidebar-item active" onclick="switchTab('skills',this)" data-tab="skills"><span>⚡</span><span>Skills</span></div>
    <div class="sidebar-item" onclick="switchTab('stats',this)" data-tab="stats"><span>📊</span><span>Stats</span></div>
    <div class="sidebar-item" onclick="switchTab('thoughts',this)" data-tab="thoughts"><span>🧠</span><span>Thought Systems</span></div>
    <div class="sidebar-item" onclick="switchTab('apps',this)" data-tab="apps"><span>📱</span><span>Mastered Apps</span></div>
    <div class="sidebar-item" onclick="switchTab('constructs',this)" data-tab="constructs"><span>🏗️</span><span>Constructs</span></div>
    <div class="sidebar-item" onclick="switchTab('roadmap',this)" data-tab="roadmap"><span>🗺️</span><span>Roadmap</span></div>
    <button class="logout-btn" onclick="doLogout()">⟳ Logout</button>
  </div>

  <div class="main-content">
    <div class="header-bar">
      <h2 id="sectionTitle">◈ SKILLS</h2>
      <span class="header-user" id="userDisplay">Sourav</span>
    </div>

    <div id="sectionSkills" class="section active">
      <button class="add-btn" onclick="openModal('skills')">+ Add Skill</button>
      <div id="skillsList"></div>
    </div>

    <div id="sectionStats" class="section">
      <button class="add-btn" onclick="openModal('stats')">+ Add Stat</button>
      <div id="statsList"></div>
    </div>

    <div id="sectionThoughts" class="section">
      <button class="add-btn" onclick="openModal('thoughts')">+ Add Thought System</button>
      <div id="thoughtsList"></div>
    </div>

    <div id="sectionApps" class="section">
      <button class="add-btn" onclick="openModal('apps')">+ Add App</button>
      <div id="appsList"></div>
    </div>

    <div id="sectionConstructs" class="section">
      <button class="add-btn" onclick="openModal('constructs')">+ Add Construct</button>
      <div id="constructsList"></div>
    </div>

    <div id="sectionRoadmap" class="section">
      <button class="add-btn" onclick="openModal('roadmap')">+ Add Roadmap Item</button>
      <div id="roadmapList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add Item</h3>
    <div id="modalBody"></div>
    <div class="modal-btns">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" id="modalSave" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('admin_token');
let CURRENT_SECTION = 'skills';
let MODE = 'add';
let EDIT_ID = null;

const API_BASE = '/api';

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API_BASE + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username: user, password: pass })
    });
    TOKEN = data.token;
    localStorage.setItem('admin_token', TOKEN);
    err.textContent = '';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminLayout').classList.add('active');
    document.getElementById('userDisplay').textContent = data.user.username;
    loadAll();
  } catch (e) {
    err.textContent = '✕ ' + e.message;
  }
}

function doLogout() {
  TOKEN = null;
  localStorage.removeItem('admin_token');
  document.getElementById('adminLayout').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
}

async function loadAll() {
  await Promise.all([
    loadSection('skills'), loadSection('stats'), loadSection('thoughts'),
    loadSection('apps'), loadSection('constructs'), loadSection('roadmap')
  ]);
}

async function loadSection(section) {
  const el = document.getElementById(section + 'List');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await api('/' + section);
    if (!data.length) {
      el.innerHTML = '<div class="empty-msg">No items yet. Add your first one!</div>';
      return;
    }
    el.innerHTML = data.map(item => renderItem(section, item)).join('');
  } catch {
    el.innerHTML = '<div class="empty-msg">Failed to load.</div>';
  }
}

function renderItem(section, item) {
  switch (section) {
    case 'skills':
      return `<div class="item-card"><div class="info"><div class="title">${esc(item.name)}</div><div class="meta">Order: ${item.order_index}</div></div><div class="actions"><button class="btn btn-sm" onclick="editItem('skills',${item.id})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteItem('skills',${item.id})">Del</button></div></div>`;
    case 'stats':
      return `<div class="item-card"><div class="info"><div class="title">${esc(item.label)}</div><div class="meta">Key: ${esc(item.key)} · Value: ${item.value}</div></div><div class="actions"><button class="btn btn-sm" onclick="editItem('stats',${item.id})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteItem('stats',${item.id})">Del</button></div></div>`;
    case 'thoughts':
      return `<div class="item-card"><div class="info"><div class="title">${esc(item.name)}</div><div class="meta">Order: ${item.order_index}</div></div><div class="actions"><button class="btn btn-sm" onclick="editItem('thoughts',${item.id})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteItem('thoughts',${item.id})">Del</button></div></div>`;
    case 'apps':
      return `<div class="item-card"><div class="info"><div class="title">${esc(item.name)}</div><div class="meta">${item.image_path ? 'Has image' : 'No image'}</div></div><div class="actions"><button class="btn btn-sm" onclick="editItem('apps',${item.id})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteItem('apps',${item.id})">Del</button></div></div>`;
    case 'constructs':
      return `<div class="item-card"><div class="info"><div class="title">${esc(item.title)}</div><div class="meta">${esc(item.tag)} · #${item.card_num} · <span style="color:${item.accent_color}">●</span></div></div><div class="actions"><button class="btn btn-sm" onclick="editItem('constructs',${item.id})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteItem('constructs',${item.id})">Del</button></div></div>`;
    case 'roadmap':
      return `<div class="item-card"><div class="info"><div class="title">${item.year} — ${esc(item.phase)}</div><div class="meta">${esc(item.description)}</div></div><div class="actions"><button class="btn btn-sm" onclick="editItem('roadmap',${item.id})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteItem('roadmap',${item.id})">Del</button></div></div>`;
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#06b6d4','#ef4444','#00D4FF','#FF6B9D','#7B61FF','#FFB347','#00FF9F','#FCD34D'];

function openModal(section, item) {
  CURRENT_SECTION = section;
  MODE = item ? 'edit' : 'add';
  EDIT_ID = item ? item.id : null;
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = (MODE === 'edit' ? 'Edit' : 'Add') + ' ' + section.replace(/s$/,'');
  
  let html = '';
  switch (section) {
    case 'skills':
      html = `<div class="form-group"><label>Skill Name</label><input id="f_name" value="${item ? esc(item.name) : ''}"></div>
              <div class="form-group"><label>Order Index</label><input id="f_order" type="number" value="${item ? item.order_index : 0}"></div>`;
      break;
    case 'stats':
      html = `<div class="form-group"><label>Key (unique identifier)</label><input id="f_key" value="${item ? esc(item.key) : ''}"></div>
              <div class="form-group"><label>Value</label><input id="f_value" type="number" value="${item ? item.value : 0}"></div>
              <div class="form-group"><label>Label (display name)</label><input id="f_label" value="${item ? esc(item.label) : ''}"></div>`;
      break;
    case 'thoughts':
      html = `<div class="form-group"><label>System Name</label><input id="f_name" value="${item ? esc(item.name) : ''}"></div>
              <div class="form-group"><label>Order Index</label><input id="f_order" type="number" value="${item ? item.order_index : 0}"></div>`;
      break;
    case 'apps':
      html = `<div class="form-group"><label>App Name</label><input id="f_name" value="${item ? esc(item.name) : ''}"></div>
              <div class="form-group"><label>Image Path (URL or upload)</label><input id="f_image" value="${item ? esc(item.image_path) : ''}"></div>
              <div class="form-group"><label>Upload Image</label><input id="f_upload" type="file" accept="image/*"></div>`;
      break;
    case 'constructs':
      html = `<div class="form-group"><label>Tag (e.g. SYSTEMS, API)</label><input id="f_tag" value="${item ? esc(item.tag) : ''}"></div>
              <div class="form-group"><label>Title</label><input id="f_title" value="${item ? esc(item.title) : ''}"></div>
              <div class="form-group"><label>Description</label><textarea id="f_desc">${item ? esc(item.description) : ''}</textarea></div>
              <div class="form-group"><label>Card Number</label><input id="f_card" value="${item ? esc(item.card_num) : ''}"></div>
              <div class="form-group"><label>Accent Color</label>
                <div class="color-picker" id="colorPicker">
                  ${COLORS.map(c => `<div class="color-swatch ${item && item.accent_color === c ? 'active' : ''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}
                </div>
                <input id="f_color" type="hidden" value="${item ? item.accent_color : '#6366f1'}">
              </div>
              <div class="form-group"><label>Order Index</label><input id="f_order" type="number" value="${item ? item.order_index : 0}"></div>`;
      break;
    case 'roadmap':
      html = `<div class="form-group"><label>Year</label><input id="f_year" type="number" value="${item ? item.year : '2026'}"></div>
              <div class="form-group"><label>Phase Name</label><input id="f_phase" value="${item ? esc(item.phase) : ''}"></div>
              <div class="form-group"><label>Description</label><textarea id="f_desc">${item ? esc(item.description) : ''}</textarea></div>
              <div class="form-group"><label>Order Index</label><input id="f_order" type="number" value="${item ? item.order_index : 0}"></div>`;
      break;
  }
  document.getElementById('modalBody').innerHTML = html;
  overlay.classList.add('active');
}

function pickColor(el, color) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('f_color').value = color;
}

async function uploadFile(inputId) {
  const input = document.getElementById(inputId);
  if (!input || !input.files || !input.files[0]) return null;
  const fd = new FormData();
  fd.append('image', input.files[0]);
  const res = await fetch(API_BASE + '/upload', {
    method: 'POST',
    headers: TOKEN ? { 'Authorization': 'Bearer ' + TOKEN } : {},
    body: fd
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error);
  return data.image_path;
}

async function saveModal() {
  const s = CURRENT_SECTION;
  let body = {};
  let fileUpload = false;

  switch (s) {
    case 'skills':
      body = { name: document.getElementById('f_name').value, order_index: parseInt(document.getElementById('f_order').value) || 0 };
      break;
    case 'stats':
      body = { key: document.getElementById('f_key').value, value: parseInt(document.getElementById('f_value').value) || 0, label: document.getElementById('f_label').value };
      break;
    case 'thoughts':
      body = { name: document.getElementById('f_name').value, order_index: parseInt(document.getElementById('f_order').value) || 0 };
      break;
    case 'apps':
      body = { name: document.getElementById('f_name').value, image_path: document.getElementById('f_image').value, order_index: 0 };
      fileUpload = true;
      break;
    case 'constructs':
      body = { tag: document.getElementById('f_tag').value, title: document.getElementById('f_title').value, description: document.getElementById('f_desc').value, card_num: document.getElementById('f_card').value, accent_color: document.getElementById('f_color').value, order_index: parseInt(document.getElementById('f_order').value) || 0 };
      break;
    case 'roadmap':
      body = { year: parseInt(document.getElementById('f_year').value) || 2026, phase: document.getElementById('f_phase').value, description: document.getElementById('f_desc').value, order_index: parseInt(document.getElementById('f_order').value) || 0 };
      break;
  }

  try {
    if (fileUpload) {
      const imgPath = await uploadFile('f_upload');
      if (imgPath) body.image_path = imgPath;
    }
    if (MODE === 'edit') {
      await api('/' + s + '/' + EDIT_ID, { method: 'PUT', body: JSON.stringify(body) });
      showToast('Updated successfully', 'success');
    } else {
      await api('/' + s, { method: 'POST', body: JSON.stringify(body) });
      showToast('Added successfully', 'success');
    }
    closeModal();
    loadSection(s);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('modalBody').innerHTML = '';
}

async function editItem(section, id) {
  const data = await api('/' + section);
  const item = data.find(i => i.id === id);
  if (item) openModal(section, item);
}

async function deleteItem(section, id) {
  if (!confirm('Delete this item?')) return;
  try {
    await api('/' + section + '/' + id, { method: 'DELETE' });
    showToast('Deleted', 'success');
    loadSection(section);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function switchTab(tab, el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  const titles = { skills: '◈ SKILLS', stats: '◈ STATS', thoughts: '◈ THOUGHT SYSTEMS', apps: '◈ MASTERED APPS', constructs: '◈ CONSTRUCTS', roadmap: '◈ ROADMAP' };
  document.getElementById('sectionTitle').textContent = titles[tab] || '◈ SECTION';
  CURRENT_SECTION = tab;
}

// Auto-login check
window.addEventListener('DOMContentLoaded', async () => {
  if (TOKEN) {
    try {
      await api('/auth/verify');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLayout').classList.add('active');
      loadAll();
    } catch {
      localStorage.removeItem('admin_token');
      TOKEN = null;
    }
  }
});
</script>
